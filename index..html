<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Tập JS 1</title>
    <link rel="stylesheet" href="./CSS/style.css" />
  </head>
  <body>
    <h3>Tính lương nhân viên</h3>
    <input id="luongNgay" type="number" placeholder="Nhập Lương 1 Ngày" />
    <input id="ngayLam" type="number" placeholder="Nhập số ngày làm" />
    <button id="btnLuong">Lương Nhân Viên</button>
    <p id="pInfo_1"></p>

    <hr />
    <h3>Tính tổng trung bình của 5 số thực</h3>
    <input id="number_1" type="number" placeholder="Nhập số thứ 1" />
    <input id="number_2" type="number" placeholder="Nhập số thứ 2" />
    <input id="number_3" type="number" placeholder="Nhập số thứ 3" />
    <input id="number_4" type="number" placeholder="Nhập số thứ 4" />
    <input id="number_5" type="number" placeholder="Nhập số thứ 5" />
    <button id="btnTrungBinh">Tổng trung bình</button>
    <p id="pInfo_2"></p>
    <hr />
    <h3>Quy đổi tiền</h3>
    <input type="number" value="23500" id="giaTri" />
    <input type="number" placeholder="Nhập số USD cần đổi" id="tienDo" />
    <button id="btnTien">Quy Đổi</button>
    <p id="pInfo_3"></p>
    <hr />
    <h3>Tính diện tích, chu vi hình chữ nhật</h3>
    <input type="number" placeholder="Nhập chiều dài" id="chieuDai" />
    <input type="number" placeholder="Nhập chiều rộng" id="chieuRong" />
    <button id="btnHCN">Tính</button>
    <p id="pInfo_4a"></p>
    <p id="pInfo_4b"></p>
    <hr />
    <h3>Tính tổng 2 ký tự</h3>
    <input type="number" placeholder="Nhập số có 2 chữ số" id="number" />
    <button id="btnTong">Tổng</button>
    <p id="pInfo_5"></p>

    <script src="./JS/./example_1.js"></script>
  </body>
</html>
